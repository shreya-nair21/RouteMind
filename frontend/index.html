<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteMind - Smart AI Travel Planner</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#ffffff',
                glow: 'rgba(255, 255, 255, 0.15)',
                hover: '#f4f4f5',
                light: 'rgba(255, 255, 255, 0.1)',
                gradientStart: '#ffffff',
                gradientEnd: '#a1a1aa',
              },
              accent: {
                DEFAULT: '#a1a1aa',
                hover: '#71717a',
                glow: 'rgba(161, 161, 170, 0.15)',
                light: 'rgba(161, 161, 170, 0.1)',
              },
              secondary: '#ffffff',
              supporting: '#ffffff',
              background: '#000000',
              surface: '#09090b',
              'surface-dark': '#000000',
              'on-surface': '#ffffff',
              'on-surface-variant': '#a1a1aa',
              travel: {
                primary: '#ffffff',
                'primary-hover': '#f4f4f5',
                accent: '#a1a1aa',
                secondary: '#ffffff',
                dark: '#09090b',
                muted: '#71717a',
                light: '#000000',
                border: 'rgba(255, 255, 255, 0.1)'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Inter', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              'travel-card': '16px',
              'travel-btn': '12px',
            },
            boxShadow: {
              'travel-card': '0 8px 32px rgba(0, 0, 0, 0.5)',
              'travel-pop': '0 2px 8px rgba(0, 0, 0, 0.4)',
              'travel-glow': '0 0 40px rgba(255, 255, 255, 0.15)',
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Inter', sans-serif;
        }
    </style>
  </head>
  <body class="bg-[#122c29] text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
